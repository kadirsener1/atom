name: 🔄 M3U8 Playlist Güncelle

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Chrome kur
      - name: 🌐 Chrome Kur
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ChromeDriver kur
      - name: 🔧 ChromeDriver Kur
        uses: nanasess/setup-chromedriver@v2

      - name: 📦 Bağımlılıkları Yükle
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Scraper Çalıştır
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          DISPLAY: ':99'
        run: |
          # Virtual display başlat
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python scraper.py

      - name: 📊 Sonuç Kontrol
        run: |
          if [ -f "playlist.m3u" ]; then
            COUNT=$(grep -c "#EXTINF" playlist.m3u || echo 0)
            echo "✅ Kanal sayısı: $COUNT"
            echo "CHANNEL_COUNT=$COUNT" >> $GITHUB_ENV
            cat playlist.m3u
          else
            echo "❌ Dosya bulunamadı!"
            exit 1
          fi

      - name: ⚙️ Git Ayarla
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: 💾 Commit & Push
        run: |
          git add playlist.m3u stats.json logs/ || true
          git diff --staged --quiet || git commit -m \
            "🔄 ${{ env.CHANNEL_COUNT }} kanal | $(date '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: 📋 Özet
        if: always()
        run: |
          echo "## 📺 Güncelleme Raporu" >> $GITHUB_STEP_SUMMARY
          echo "| Alan | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Kanal | ${{ env.CHANNEL_COUNT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tarih | $(date '+%Y-%m-%d %H:%M') |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | \`https://raw.githubusercontent.com/${{ github.repository }}/main/playlist.m3u\` |" >> $GITHUB_STEP_SUMMARY
